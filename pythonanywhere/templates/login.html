<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#2c2c2c">
    <title>Future Notes - Login</title>
    <link rel="apple-touch-icon" sizes="180x180" href="static/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="static/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="static/favicon-16x16.png">
    <link rel="favicon" type="image/x-icon" href="static/favicon.ico">
    <link rel="manifest" href="static/site.webmanifest">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="/static/js/loader.js"></script>
    <script src="/static/js/check.js"></script>
    <style>
        :root {
            /* — App palette (unchanged) — */
            --bg-color:  #2c2c2c;
            --hdr-color: #3a3a3a;
            --ctr-color: #1e1e1e;
            --btn-color: #424242;

            /* — Login-page extras — */
            --accent:       #5b8cf7;
            --accent-dim:   rgba(91,140,247,0.15);
            --accent-glow:  rgba(91,140,247,0.22);
            --text-primary: #e8e8e8;
            --text-muted:   #9a9a9a;
            --text-dim:     #606060;
            --border:       rgba(255,255,255,0.07);
            --border-hover: rgba(255,255,255,0.13);
            --danger:       #e07070;
            --danger-bg:    rgba(224,112,112,0.08);
            --radius:       8px;
            --radius-sm:    6px;
            --ease:         cubic-bezier(0.4,0,0.2,1);
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        html { height: 100%; }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: 'Outfit', sans-serif;
            font-weight: 400;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px 16px;
            position: relative;
            overflow-x: hidden;
        }

        /* Subtle vignette */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: radial-gradient(ellipse 90% 80% at 50% 50%,
                transparent 30%,
                rgba(10,10,10,0.35) 100%);
            pointer-events: none;
            z-index: 0;
        }

        /* Very faint accent wash — top center glow */
        body::after {
            content: '';
            position: fixed;
            top: -120px;
            left: 50%;
            transform: translateX(-50%);
            width: 600px;
            height: 400px;
            background: radial-gradient(ellipse, rgba(91,140,247,0.055) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        /* ── Back button ── */
        .back-button {
            position: fixed;
            top: 20px;
            left: 20px;
            width: 38px;
            height: 38px;
            background: var(--hdr-color);
            border: 1px solid var(--border);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 17px;
            font-family: 'Outfit', sans-serif;
            transition: background 0.2s var(--ease), color 0.2s var(--ease), border-color 0.2s var(--ease);
            z-index: 10;
        }
        .back-button:hover {
            background: var(--btn-color);
            border-color: var(--border-hover);
            color: var(--text-primary);
        }

        /* ── Page wrapper ── */
        .page-wrapper {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 400px;
            opacity: 0;
            transform: translateY(14px);
            animation: revealUp 0.55s var(--ease) 0.05s forwards;
        }

        @keyframes revealUp {
            to { opacity: 1; transform: translateY(0); }
        }

        /* ── Logo / heading area ── */
        .logo-area {
            text-align: center;
            margin-bottom: 28px;
        }

        .logo-icon {
            width: 46px;
            height: 46px;
            background: var(--ctr-color);
            border: 1px solid var(--border-hover);
            border-radius: 12px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 14px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.3), 0 0 0 1px rgba(255,255,255,0.04) inset;
        }

        .logo-icon svg {
            width: 22px;
            height: 22px;
        }

        .logo-area h1 {
            font-size: 22px;
            font-weight: 600;
            color: var(--text-primary);
            letter-spacing: -0.02em;
            margin-bottom: 4px;
        }

        .logo-area p {
            font-size: 13px;
            color: var(--text-dim);
            font-weight: 400;
        }

        /* ── Card ── */
        .card {
            background: var(--hdr-color);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 28px;
            box-shadow:
                0 1px 0 rgba(255,255,255,0.05) inset,
                0 20px 60px rgba(0,0,0,0.4),
                0 4px 16px rgba(0,0,0,0.25);
        }

        /* ── Alerts ── */
        .warning-message {
            color: var(--danger);
            font-size: 13px;
            padding: 10px 13px;
            margin-bottom: 18px;
            background: var(--danger-bg);
            border: 1px solid rgba(224,112,112,0.2);
            border-radius: var(--radius-sm);
            display: none;
        }
        .warning-message.visible { display: block; }

        /* ── Field ── */
        .field {
            margin-bottom: 16px;
        }

        .field label {
            display: block;
            font-size: 12px;
            font-weight: 500;
            color: var(--text-muted);
            letter-spacing: 0.03em;
            margin-bottom: 7px;
        }

        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 10px 13px;
            background: var(--ctr-color);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            color: var(--text-primary);
            font-family: 'Outfit', sans-serif;
            font-size: 14px;
            font-weight: 400;
            outline: none;
            transition: border-color 0.18s var(--ease), box-shadow 0.18s var(--ease);
        }
        input[type="text"]::placeholder,
        input[type="password"]::placeholder {
            color: var(--text-dim);
        }
        input[type="text"]:hover,
        input[type="password"]:hover {
            border-color: var(--border-hover);
        }
        input[type="text"]:focus,
        input[type="password"]:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        /* ── Divider ── */
        .divider {
            height: 1px;
            background: var(--border);
            margin: 20px 0;
        }

        /* ── Checkbox ── */
        .checkbox-row {
            display: flex;
            align-items: center;
            gap: 9px;
            cursor: pointer;
            user-select: none;
            margin-bottom: 20px;
        }
        .checkbox-row input { display: none; }

        .cb-box {
            width: 17px;
            height: 17px;
            flex-shrink: 0;
            background: var(--ctr-color);
            border: 1px solid var(--border-hover);
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.15s var(--ease), border-color 0.15s var(--ease), box-shadow 0.15s var(--ease);
        }
        .cb-box svg {
            opacity: 0;
            transform: scale(0.5);
            transition: opacity 0.15s, transform 0.15s;
        }
        .checkbox-row input:checked + .cb-box {
            background: var(--accent);
            border-color: var(--accent);
            box-shadow: 0 0 0 2px var(--accent-dim);
        }
        .checkbox-row input:checked + .cb-box svg {
            opacity: 1;
            transform: scale(1);
        }

        .cb-label {
            font-size: 13px;
            color: var(--text-muted);
        }

        /* ── Button ── */
        .btn {
            width: 100%;
            padding: 11px;
            background: var(--accent);
            border: none;
            border-radius: var(--radius-sm);
            color: #fff;
            font-family: 'Outfit', sans-serif;
            font-size: 14px;
            font-weight: 500;
            letter-spacing: 0.01em;
            cursor: pointer;
            transition: background 0.18s var(--ease), box-shadow 0.18s var(--ease), transform 0.1s;
            box-shadow: 0 2px 12px rgba(91,140,247,0.28), 0 1px 0 rgba(255,255,255,0.1) inset;
            position: relative;
            overflow: hidden;
        }
        .btn::after {
            content: '';
            position: absolute;
            inset: 0;
            background: rgba(255,255,255,0);
            transition: background 0.15s;
        }
        .btn:hover {
            background: #6f9cf9;
            box-shadow: 0 4px 18px rgba(91,140,247,0.38);
        }
        .btn:hover::after { background: rgba(255,255,255,0.05); }
        .btn:active { transform: translateY(1px); }

        /* ── Footer ── */
        .form-footer {
            margin-top: 20px;
            text-align: center;
            font-size: 12.5px;
            color: var(--text-dim);
            line-height: 1.9;
        }
        .form-footer a {
            color: var(--text-muted);
            text-decoration: none;
            transition: color 0.18s;
        }
        .form-footer a:hover { color: var(--accent); }
        .sep { margin: 0 6px; opacity: 0.4; }

        /* ── 2FA Modal ── */
        #twofa-modal-backdrop {
            position: fixed;
            inset: 0;
            background: rgba(8,8,10,0.65);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            backdrop-filter: blur(4px);
            padding: 20px;
        }

        #twofa-modal {
            width: 100%;
            max-width: 380px;
            background: var(--hdr-color);
            border: 1px solid var(--border-hover);
            border-radius: var(--radius);
            padding: 28px;
            box-shadow: 0 30px 80px rgba(0,0,0,0.6);
            animation: modalIn 0.25s var(--ease);
        }

        @keyframes modalIn {
            from { opacity: 0; transform: translateY(10px) scale(0.98); }
            to   { opacity: 1; transform: none; }
        }

        #twofa-modal h2 {
            font-size: 17px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 5px;
            letter-spacing: -0.01em;
        }
        #twofa-modal p.sub {
            font-size: 13px;
            color: var(--text-muted);
            margin-bottom: 20px;
            line-height: 1.5;
        }

        #twofa-code-input {
            width: 100%;
            padding: 11px 13px;
            background: var(--ctr-color);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            color: var(--text-primary);
            font-family: 'Outfit', sans-serif;
            font-size: 20px;
            font-weight: 400;
            letter-spacing: 0.2em;
            text-align: center;
            outline: none;
            margin-bottom: 14px;
            transition: border-color 0.18s, box-shadow 0.18s;
        }
        #twofa-code-input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        .twofa-row {
            display: flex;
            gap: 8px;
            align-items: center;
            flex-wrap: wrap;
        }

        #twofa-submit-btn {
            padding: 9px 18px;
            background: var(--accent);
            border: none;
            border-radius: var(--radius-sm);
            color: #fff;
            font-family: 'Outfit', sans-serif;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            box-shadow: 0 2px 10px rgba(91,140,247,0.25);
            transition: background 0.18s, box-shadow 0.18s;
        }
        #twofa-submit-btn:hover { background: #6f9cf9; }
        #twofa-submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        #twofa-cancel-btn {
            padding: 9px 16px;
            background: var(--btn-color);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            color: var(--text-muted);
            font-family: 'Outfit', sans-serif;
            font-size: 13px;
            font-weight: 400;
            cursor: pointer;
            transition: background 0.15s, color 0.15s;
        }
        #twofa-cancel-btn:hover { background: #4e4e4e; color: var(--text-primary); }

        .twofa-alt {
            background: none;
            border: none;
            color: var(--text-dim);
            font-family: 'Outfit', sans-serif;
            font-size: 12px;
            cursor: pointer;
            padding: 6px 4px;
            margin-left: auto;
            transition: color 0.15s;
        }
        .twofa-alt:hover { color: var(--accent); }

        #twofa-error {
            color: var(--danger);
            font-size: 12.5px;
            margin-top: 10px;
            display: none;
        }
        #twofa-info {
            font-size: 11.5px;
            color: var(--text-dim);
            margin-top: 8px;
        }

        /* ── Responsive ── */
        @media (max-width: 480px) {
            body { justify-content: flex-start; padding-top: 64px; }
            .card { padding: 22px 18px; }
            #twofa-modal { padding: 22px 18px; }
            .twofa-row { flex-direction: column; align-items: stretch; }
            #twofa-submit-btn, #twofa-cancel-btn { width: 100%; text-align: center; }
            .twofa-alt { margin-left: 0; text-align: center; }
        }
    </style>
    <script>
        if ('serviceWorker' in navigator) {
          navigator.serviceWorker.register('/static/sw_js/sw.js')
            .then(() => console.log('Service Worker Registered'))
            .catch(console.error);
        }
    </script>
    <script src="/static/custom-alert.js"></script>
    <script src="static/admin.js"></script>
</head>
<body>

    <a href="/" class="back-button" aria-label="Go back to homepage">←</a>

    <div class="page-wrapper">

        <!-- Logo area -->
        <div class="logo-area">
            <div class="logo-icon">
                <img src="/static/android-chrome-192x192.png" width="100" height="100">
            </div>
            <h1>Future Notes</h1>
            <p>Sign in to your account</p>
        </div>

        <!-- Card -->
        <div class="card">

            <div id="warning-message" class="warning-message">
                You need to log in to access that page.
            </div>
            <div id="ban-message" class="warning-message">
                Your account has been suspended.
            </div>

            <form id="login-form" novalidate>

                <div class="field">
                    <label for="username">Username</label>
                    <input type="text" id="username" autocomplete="username" placeholder="Your username" required>
                </div>

                <div class="field">
                    <label for="password">Password</label>
                    <input type="password" id="password" autocomplete="current-password" placeholder="••••••••" required>
                </div>

                <div class="divider"></div>

                <label class="checkbox-row">
                    <input type="checkbox" id="remember-me" checked>
                    <span class="cb-box">
                        <svg width="9" height="7" viewBox="0 0 9 7" fill="none">
                            <path d="M1 3.5L3.5 6L8 1" stroke="white" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                    </span>
                    <span class="cb-label">Keep me signed in</span>
                </label>

                <button type="submit" class="btn">Sign in</button>

            </form>

        </div>

        <div class="form-footer">
            No account? <a id="signup-link" href="/signup_page">Sign up</a>
            <span class="sep">·</span>
            <a href="/reset-password">Forgot password</a>
        </div>

    </div>

    <!-- 2FA Modal -->
    <div id="twofa-modal-backdrop" role="dialog" aria-modal="true" aria-hidden="true">
        <div id="twofa-modal" role="document" aria-labelledby="twofa-title">
            <h2 id="twofa-title">Two-step verification</h2>
            <p class="sub">Enter the code from your authenticator app or use a backup code.</p>

            <label for="twofa-code-input" class="sr-only">2FA code</label>
            <input id="twofa-code-input" inputmode="numeric" autocomplete="one-time-code"
                maxlength="12" placeholder="· · · · · ·" aria-label="2FA code" />

            <div class="twofa-row">
                <button id="twofa-submit-btn">Verify</button>
                <button id="twofa-cancel-btn">Cancel</button>
                <button id="twofa-use-backup" class="twofa-alt">Use backup code</button>
            </div>

            <div id="twofa-error" role="alert"></div>
            <div id="twofa-info">If your code isn't working, check your device clock.</div>
        </div>
    </div>

    <script>
document.addEventListener("DOMContentLoaded", async () => {
    if (!window.__fetchPatched) {
        const _f = window.fetch;
        window.fetch = (url, opts = {}) => {
            opts = opts || {};
            if (!opts.credentials) opts.credentials = "include";
            return _f(url, opts);
        };
        window.__fetchPatched = true;
    }

    const params = new URLSearchParams(window.location.search);
    const redirectUrl = params.get("redirect") || "/index";

    const backdrop  = document.getElementById("twofa-modal-backdrop");
    const codeInput = document.getElementById("twofa-code-input");
    const submitBtn = document.getElementById("twofa-submit-btn");
    const cancelBtn = document.getElementById("twofa-cancel-btn");
    const backupBtn = document.getElementById("twofa-use-backup");
    const errorBox  = document.getElementById("twofa-error");
    const loginForm = document.getElementById("login-form");

    let currentLoginToken = null;
    let currentRedirect = redirectUrl;

    function showError(msg) {
        if (!errorBox) return;
        errorBox.style.display = msg ? "block" : "none";
        errorBox.textContent = msg || "";
    }

    function escHandler(e) {
        if (e.key === "Escape") hideTwoFAModal();
    }

    function showTwoFAModal(loginToken, redirect = "/index") {
        currentLoginToken = loginToken;
        currentRedirect = redirect || "/index";
        showError("");

        if (codeInput) codeInput.value = "";
        if (backdrop) {
            backdrop.style.display = "flex";
            backdrop.setAttribute("aria-hidden", "false");
        }

        setTimeout(() => {
            try { codeInput && codeInput.focus(); } catch (e) {}
        }, 50);

        window.addEventListener("keydown", escHandler);
    }

    function hideTwoFAModal() {
        if (backdrop) {
            backdrop.style.display = "none";
            backdrop.setAttribute("aria-hidden", "true");
        }
        currentLoginToken = null;
        window.removeEventListener("keydown", escHandler);
        showError("");
    }

    async function checkSession() {
        const r = await fetch("/session", { method: "GET" });
        if (r.ok) {
            const data = await r.json().catch(() => ({}));
            window.location.href = data.startpage || "/index";
            return true;
        }
        if (r.status === 403) {
            window.location.href = "/login_page?suspended=true";
            return true;
        }
        return false;
    }

    async function submitCode(code) {
        if (!currentLoginToken) {
            showError("Missing login session. Please try logging in again.");
            return;
        }

        showError("");
        submitBtn.disabled = true;
        const prevTxt = submitBtn.textContent;
        submitBtn.textContent = "Verifying…";

        try {
            const res = await fetch("/login/2fa", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    login_token: currentLoginToken,
                    code: code
                })
            });

            const j = await res.json().catch(() => ({}));

            if (res.ok) {
                try { sessionStorage.setItem("current_user_id", j.user_id); } catch (e) {}
                window.location.href = j.startpage || currentRedirect || "/index";
                return;
            }

            showError(j.error || "Invalid code");
        } catch (err) {
            showError("Network error — try again.");
        } finally {
            submitBtn.disabled = false;
            submitBtn.textContent = prevTxt || "Verify";
        }
    }

    try {
        if (submitBtn) {
            submitBtn.addEventListener("click", () => {
                const code = codeInput.value.trim();
                if (!code) {
                    showError("Please enter the code.");
                    return;
                }
                submitCode(code);
            });
        }

        if (cancelBtn) cancelBtn.addEventListener("click", hideTwoFAModal);

        if (backupBtn) {
            backupBtn.addEventListener("click", () => {
                const code = prompt("Enter a backup code:");
                if (code) submitCode(code.trim());
            });
        }

        if (codeInput) {
            codeInput.addEventListener("keyup", (e) => {
                if (e.key === "Enter") submitBtn && submitBtn.click();
            });
        }
    } catch (e) {}

    window.__showTwoFAModal = showTwoFAModal;

    await checkSession();

    if (loginForm) {
        loginForm.addEventListener("submit", async (e) => {
            e.preventDefault();

            const user = document.getElementById("username").value.trim();
            const pass = document.getElementById("password").value;
            const keep = document.getElementById("remember-me").checked;

            if (!user || !pass) {
                alert("Please enter both username and password.");
                return;
            }

            const res = await fetch("/login", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    username: user,
                    password: pass,
                    keep_login: keep
                })
            });

            const data = await res.json().catch(() => ({}));

            if (res.ok && data["2fa_required"]) {
                if (!data.login_token) {
                    showError("2FA was required, but no login token was returned.");
                    return;
                }
                showTwoFAModal(data.login_token, redirectUrl);
                return;
            }

            if (res.ok) {
                try { sessionStorage.setItem("current_user_id", data.user_id); } catch (e) {}
                window.location.href = data.startpage || redirectUrl || "/index";
                return;
            }

            alert(data.error || "Login failed");
        });
    }
});
</script>
</body>
</html>
