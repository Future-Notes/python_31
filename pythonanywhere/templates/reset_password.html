<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#2c2c2c">
    <title>Set New Password - Future Notes</title>
    <link rel="apple-touch-icon" sizes="180x180" href="static/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="static/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="static/favicon-16x16.png">
    <link rel="favicon" type="image/x-icon" href="static/favicon.ico">
    <link rel="manifest" href="/static/site.webmanifest">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color:  #2c2c2c; --hdr-color: #3a3a3a;
            --ctr-color: #1e1e1e; --btn-color: #424242;
            --accent:       #5b8cf7; --accent-dim:  rgba(91,140,247,0.15);
            --accent-glow:  rgba(91,140,247,0.22);
            --text-primary: #e8e8e8; --text-muted: #9a9a9a; --text-dim: #606060;
            --border:       rgba(255,255,255,0.07); --border-hover: rgba(255,255,255,0.13);
            --danger: #e07070; --danger-bg: rgba(224,112,112,0.08);
            --success: #6bc97a; --success-bg: rgba(107,201,122,0.08);
            --radius: 8px; --radius-sm: 6px;
            --ease: cubic-bezier(0.4,0,0.2,1);
        }
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        html { height: 100%; }
        body {
            background-color: var(--bg-color); color: var(--text-primary);
            font-family: 'Outfit', sans-serif; font-weight: 400;
            min-height: 100vh; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            padding: 24px 16px; position: relative; overflow-x: hidden;
        }
        body::before {
            content: ''; position: fixed; inset: 0;
            background: radial-gradient(ellipse 90% 80% at 50% 50%, transparent 30%, rgba(10,10,10,0.35) 100%);
            pointer-events: none; z-index: 0;
        }
        body::after {
            content: ''; position: fixed; top: -120px; left: 50%; transform: translateX(-50%);
            width: 600px; height: 400px;
            background: radial-gradient(ellipse, rgba(91,140,247,0.055) 0%, transparent 70%);
            pointer-events: none; z-index: 0;
        }
        .back-button {
            position: fixed; top: 20px; left: 20px; width: 38px; height: 38px;
            background: var(--hdr-color); border: 1px solid var(--border); border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            color: var(--text-muted); text-decoration: none; font-size: 17px;
            transition: background 0.2s var(--ease), color 0.2s var(--ease), border-color 0.2s var(--ease); z-index: 10;
        }
        .back-button:hover { background: var(--btn-color); border-color: var(--border-hover); color: var(--text-primary); }
        .page-wrapper {
            position: relative; z-index: 1; width: 100%; max-width: 400px;
            opacity: 0; transform: translateY(14px);
            animation: revealUp 0.55s var(--ease) 0.05s forwards;
        }
        @keyframes revealUp { to { opacity: 1; transform: translateY(0); } }
        .logo-area { text-align: center; margin-bottom: 28px; }
        .logo-icon {
            width: 46px; height: 46px; background: var(--ctr-color);
            border: 1px solid var(--border-hover); border-radius: 12px;
            display: inline-flex; align-items: center; justify-content: center; margin-bottom: 14px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.3), 0 0 0 1px rgba(255,255,255,0.04) inset;
        }
        .logo-icon svg { width: 22px; height: 22px; }
        .logo-area h1 { font-size: 22px; font-weight: 600; color: var(--text-primary); letter-spacing: -0.02em; margin-bottom: 4px; }
        .logo-area p { font-size: 13px; color: var(--text-dim); }
        .card {
            background: var(--hdr-color); border: 1px solid var(--border); border-radius: var(--radius); padding: 28px;
            box-shadow: 0 1px 0 rgba(255,255,255,0.05) inset, 0 20px 60px rgba(0,0,0,0.4), 0 4px 16px rgba(0,0,0,0.25);
        }
        .step { display: none; }
        .step.active { display: block; }
        .field { margin-bottom: 4px; }
        .field label { display: block; font-size: 12px; font-weight: 500; color: var(--text-muted); letter-spacing: 0.03em; margin-bottom: 7px; }
        input[type="password"], input[type="text"] {
            width: 100%; padding: 10px 13px; background: var(--ctr-color);
            border: 1px solid var(--border); border-radius: var(--radius-sm);
            color: var(--text-primary); font-family: 'Outfit', sans-serif;
            font-size: 14px; font-weight: 400; outline: none;
            transition: border-color 0.18s var(--ease), box-shadow 0.18s var(--ease);
        }
        input::placeholder { color: var(--text-dim); }
        input:hover { border-color: var(--border-hover); }
        input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }
        input.input-error { border-color: rgba(224,112,112,0.6) !important; }
        input.input-ok    { border-color: rgba(107,201,122,0.45) !important; }
        .tip {
            font-size: 12px; margin-top: 6px; margin-bottom: 12px;
            padding: 8px 11px; border-radius: var(--radius-sm);
            border: 1px solid transparent; display: none; line-height: 1.5;
        }
        .tip.visible { display: block; }
        .tip.error  { color: var(--danger);  background: var(--danger-bg);  border-color: rgba(224,112,112,0.2); }
        .tip.success{ color: var(--success); background: var(--success-bg); border-color: rgba(107,201,122,0.2); }
        .error-box {
            font-size: 13px; padding: 10px 13px; margin-bottom: 16px;
            background: var(--danger-bg); border: 1px solid rgba(224,112,112,0.2);
            border-radius: var(--radius-sm); color: var(--danger); display: none;
        }
        .error-box.visible { display: block; }
        @keyframes shake {
            0%{transform:translateX(0)} 20%{transform:translateX(-5px)}
            40%{transform:translateX(5px)} 60%{transform:translateX(-4px)}
            80%{transform:translateX(4px)} 100%{transform:translateX(0)}
        }
        .shake { animation: shake 0.4s var(--ease); }
        .btn {
            width: 100%; padding: 11px; background: var(--accent); border: none;
            border-radius: var(--radius-sm); color: #fff; font-family: 'Outfit', sans-serif;
            font-size: 14px; font-weight: 500; letter-spacing: 0.01em; cursor: pointer; margin-top: 4px;
            transition: background 0.18s var(--ease), box-shadow 0.18s var(--ease), transform 0.1s, opacity 0.2s;
            box-shadow: 0 2px 12px rgba(91,140,247,0.28), 0 1px 0 rgba(255,255,255,0.1) inset;
        }
        .btn:hover:not(:disabled) { background: #6f9cf9; box-shadow: 0 4px 18px rgba(91,140,247,0.38); }
        .btn:active:not(:disabled) { transform: translateY(1px); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .form-footer { margin-top: 20px; text-align: center; font-size: 12.5px; color: var(--text-dim); }
        .form-footer a { color: var(--text-muted); text-decoration: none; transition: color 0.18s; }
        .form-footer a:hover { color: var(--accent); }
        .success-content { text-align: center; padding: 8px 0; }
        .success-icon-wrap { width: 88px; height: 88px; margin: 0 auto 22px; }
        .success-title { font-size: 17px; font-weight: 600; color: var(--text-primary); letter-spacing: -0.01em; margin-bottom: 8px; }
        .success-body { font-size: 13px; color: var(--text-muted); line-height: 1.65; margin-bottom: 22px; }

        /* ── Loader ── */
        .loader-backdrop {
            position: fixed; inset: 0; background: rgba(8,8,10,0.72);
            backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
            display: none; align-items: center; justify-content: center;
            z-index: 9999; flex-direction: column; gap: 24px;
        }
        .loader-backdrop.active { display: flex; }
        .loader-stage { position: relative; width: 96px; height: 96px; }
        .loader-glow {
            position: absolute; inset: -20px; border-radius: 50%;
            background: radial-gradient(circle, rgba(91,140,247,0.2) 0%, transparent 70%);
            animation: glowPulse 2s ease-in-out infinite;
        }
        @keyframes glowPulse { 0%,100%{opacity:0.6;transform:scale(1)} 50%{opacity:1;transform:scale(1.12)} }
        .loader-svg { width: 96px; height: 96px; overflow: visible; }
        .ring-outer { transform-origin: 48px 48px; animation: spinCW  1.1s linear infinite; }
        .ring-mid   { transform-origin: 48px 48px; animation: spinCCW 1.7s linear infinite; }
        .ring-inner { transform-origin: 48px 48px; animation: spinCW  2.5s linear infinite; }
        .orbit-dot  { transform-origin: 48px 48px; animation: spinCW  1.7s linear infinite; }
        @keyframes spinCW  { to { transform: rotate(360deg);  } }
        @keyframes spinCCW { to { transform: rotate(-360deg); } }
        .core-ring { animation: corePulse 1.1s ease-in-out infinite; transform-origin: 48px 48px; }
        @keyframes corePulse { 0%,100%{opacity:0.9} 50%{opacity:0.3} }
        .loader-label {
            font-size: 13px; color: var(--text-dim); letter-spacing: 0.04em; font-family: 'Outfit', sans-serif;
            animation: fadeBlink 2s ease-in-out infinite;
        }
        @keyframes fadeBlink { 0%,100%{opacity:0.5} 50%{opacity:1} }

        @media (max-width: 480px) {
            body { justify-content: flex-start; padding-top: 64px; }
            .card { padding: 22px 18px; }
        }
    </style>
</head>
<body>

<a href="/login_page" class="back-button" aria-label="Go back">←</a>

<div id="loader" class="loader-backdrop" role="status">
    <div class="loader-stage">
        <div class="loader-glow"></div>
        <svg class="loader-svg" viewBox="0 0 96 96" fill="none">
            <defs>
                <linearGradient id="cA" gradientUnits="userSpaceOnUse" x1="48" y1="4" x2="48" y2="92">
                    <stop offset="0%" stop-color="#5b8cf7" stop-opacity="1"/><stop offset="100%" stop-color="#5b8cf7" stop-opacity="0"/>
                </linearGradient>
                <linearGradient id="cB" gradientUnits="userSpaceOnUse" x1="48" y1="16" x2="48" y2="80">
                    <stop offset="0%" stop-color="#8ab0ff" stop-opacity="0.85"/><stop offset="100%" stop-color="#8ab0ff" stop-opacity="0"/>
                </linearGradient>
                <linearGradient id="cC" gradientUnits="userSpaceOnUse" x1="48" y1="24" x2="48" y2="72">
                    <stop offset="0%" stop-color="#5b8cf7" stop-opacity="0.6"/><stop offset="100%" stop-color="#5b8cf7" stop-opacity="0"/>
                </linearGradient>
                <filter id="gA" x="-40%" y="-40%" width="180%" height="180%">
                    <feGaussianBlur stdDeviation="2.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
                </filter>
                <filter id="gB" x="-60%" y="-60%" width="220%" height="220%">
                    <feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
                </filter>
            </defs>
            <circle cx="48" cy="48" r="40" stroke="rgba(255,255,255,0.04)" stroke-width="1" fill="none"/>
            <circle cx="48" cy="48" r="28" stroke="rgba(255,255,255,0.04)" stroke-width="1" fill="none"/>
            <circle cx="48" cy="48" r="16" stroke="rgba(255,255,255,0.03)" stroke-width="1" fill="none"/>
            <g class="ring-outer" filter="url(#gA)">
                <circle cx="48" cy="48" r="40" stroke="url(#cA)" stroke-width="2.2" stroke-dasharray="130 121" stroke-linecap="round" fill="none" opacity="0.95"/>
                <circle cx="48" cy="8" r="2.8" fill="#5b8cf7"/>
            </g>
            <g class="ring-mid" filter="url(#gA)">
                <circle cx="48" cy="48" r="28" stroke="url(#cB)" stroke-width="1.8" stroke-dasharray="80 96" stroke-linecap="round" fill="none" opacity="0.7"/>
                <circle cx="48" cy="20" r="2.2" fill="#8ab0ff" opacity="0.9"/>
            </g>
            <g class="ring-inner">
                <circle cx="48" cy="48" r="16" stroke="url(#cC)" stroke-width="1.4" stroke-dasharray="55 45" stroke-linecap="round" fill="none" opacity="0.55"/>
            </g>
            <g class="orbit-dot"><g transform="rotate(180,48,48)"><circle cx="48" cy="20" r="1.6" fill="#5b8cf7" opacity="0.45"/></g></g>
            <circle class="core-ring" cx="48" cy="48" r="4" fill="#5b8cf7" filter="url(#gB)"/>
            <circle cx="48" cy="48" r="7" stroke="rgba(91,140,247,0.25)" stroke-width="1" fill="none"/>
        </svg>
    </div>
    <span class="loader-label" id="loader-label">Verifying link…</span>
</div>

<div class="page-wrapper">
    <div class="logo-area">
        <div class="logo-icon">
            <img src="/static/android-chrome-192x192.png" width="100" height="100">
        </div>
        <h1>Future Notes</h1>
        <p>Set a new password</p>
    </div>

    <div class="card">
        <!-- Step 1: form -->
        <div id="step1" class="step active">
            <div class="field">
                <label for="new-password">New password</label>
                <input type="password" id="new-password" autocomplete="new-password" placeholder="••••••••" required>
            </div>
            <div id="password-tip" class="tip"></div>

            <div class="field">
                <label for="confirm-password">Confirm password</label>
                <input type="password" id="confirm-password" autocomplete="new-password" placeholder="••••••••" required>
            </div>
            <div id="confirm-tip" class="tip"></div>

            <div id="error-box" class="error-box"></div>
            <button id="reset-password" class="btn">Set new password</button>
        </div>

        <!-- Step 2: success -->
        <div id="step2" class="step">
            <div class="success-content">
                <div class="success-icon-wrap">
                    <svg viewBox="0 0 88 88" fill="none" style="width:88px;height:88px;overflow:visible;">
                        <defs>
                            <filter id="sg" x="-50%" y="-50%" width="200%" height="200%">
                                <feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
                            </filter>
                            <filter id="sg2" x="-80%" y="-80%" width="260%" height="260%">
                                <feGaussianBlur stdDeviation="6" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
                            </filter>
                        </defs>
                        <circle cx="44" cy="44" r="34" fill="rgba(91,140,247,0.06)" filter="url(#sg2)" opacity="0">
                            <animate attributeName="opacity" values="0;1" dur="0.3s" begin="0s" fill="freeze"/>
                        </circle>
                        <!-- Ripples -->
                        <circle cx="44" cy="44" r="33" fill="none" stroke="#5b8cf7" stroke-width="1.5">
                            <animate attributeName="r" values="33;58" dur="1s" begin="0.55s" fill="freeze" calcMode="spline" keySplines="0.15 0 0.3 1"/>
                            <animate attributeName="opacity" values="0.55;0" dur="1s" begin="0.55s" fill="freeze"/>
                        </circle>
                        <circle cx="44" cy="44" r="33" fill="none" stroke="#8ab0ff" stroke-width="0.8">
                            <animate attributeName="r" values="33;68" dur="1.2s" begin="0.7s" fill="freeze" calcMode="spline" keySplines="0.15 0 0.3 1"/>
                            <animate attributeName="opacity" values="0.3;0" dur="1.2s" begin="0.7s" fill="freeze"/>
                        </circle>
                        <circle cx="44" cy="44" r="33" fill="none" stroke="#5b8cf7" stroke-width="0.5">
                            <animate attributeName="r" values="33;50" dur="0.7s" begin="0.45s" fill="freeze"/>
                            <animate attributeName="opacity" values="0.4;0" dur="0.7s" begin="0.45s" fill="freeze"/>
                        </circle>
                        <!-- Cardinal sparks -->
                        <line x1="44" y1="8"  x2="44" y2="3"  stroke="#5b8cf7" stroke-width="1.6" stroke-linecap="round" opacity="0">
                            <animate attributeName="opacity" values="0;1;0" dur="0.5s" begin="0.62s" fill="freeze"/>
                            <animate attributeName="y1" values="9;5"  dur="0.5s" begin="0.62s" fill="freeze"/>
                            <animate attributeName="y2" values="3;-4" dur="0.5s" begin="0.62s" fill="freeze"/>
                        </line>
                        <line x1="44" y1="80" x2="44" y2="85" stroke="#5b8cf7" stroke-width="1.6" stroke-linecap="round" opacity="0">
                            <animate attributeName="opacity" values="0;1;0" dur="0.5s" begin="0.62s" fill="freeze"/>
                            <animate attributeName="y1" values="79;83" dur="0.5s" begin="0.62s" fill="freeze"/>
                            <animate attributeName="y2" values="85;92" dur="0.5s" begin="0.62s" fill="freeze"/>
                        </line>
                        <line x1="80" y1="44" x2="85" y2="44" stroke="#5b8cf7" stroke-width="1.6" stroke-linecap="round" opacity="0">
                            <animate attributeName="opacity" values="0;1;0" dur="0.5s" begin="0.62s" fill="freeze"/>
                            <animate attributeName="x1" values="79;83" dur="0.5s" begin="0.62s" fill="freeze"/>
                            <animate attributeName="x2" values="85;92" dur="0.5s" begin="0.62s" fill="freeze"/>
                        </line>
                        <line x1="8" y1="44" x2="3" y2="44" stroke="#5b8cf7" stroke-width="1.6" stroke-linecap="round" opacity="0">
                            <animate attributeName="opacity" values="0;1;0" dur="0.5s" begin="0.62s" fill="freeze"/>
                            <animate attributeName="x1" values="9;5"  dur="0.5s" begin="0.62s" fill="freeze"/>
                            <animate attributeName="x2" values="3;-4" dur="0.5s" begin="0.62s" fill="freeze"/>
                        </line>
                        <!-- Diagonal sparks -->
                        <line x1="68" y1="20" x2="73" y2="15" stroke="#8ab0ff" stroke-width="1.2" stroke-linecap="round" opacity="0">
                            <animate attributeName="opacity" values="0;0.9;0" dur="0.5s" begin="0.68s" fill="freeze"/>
                            <animate attributeName="x1" values="67;71" dur="0.5s" begin="0.68s" fill="freeze"/>
                            <animate attributeName="y1" values="21;17" dur="0.5s" begin="0.68s" fill="freeze"/>
                            <animate attributeName="x2" values="73;79" dur="0.5s" begin="0.68s" fill="freeze"/>
                            <animate attributeName="y2" values="15;9"  dur="0.5s" begin="0.68s" fill="freeze"/>
                        </line>
                        <line x1="68" y1="68" x2="73" y2="73" stroke="#8ab0ff" stroke-width="1.2" stroke-linecap="round" opacity="0">
                            <animate attributeName="opacity" values="0;0.9;0" dur="0.5s" begin="0.68s" fill="freeze"/>
                            <animate attributeName="x1" values="67;71" dur="0.5s" begin="0.68s" fill="freeze"/>
                            <animate attributeName="y1" values="67;71" dur="0.5s" begin="0.68s" fill="freeze"/>
                            <animate attributeName="x2" values="73;79" dur="0.5s" begin="0.68s" fill="freeze"/>
                            <animate attributeName="y2" values="73;79" dur="0.5s" begin="0.68s" fill="freeze"/>
                        </line>
                        <line x1="20" y1="20" x2="15" y2="15" stroke="#8ab0ff" stroke-width="1.2" stroke-linecap="round" opacity="0">
                            <animate attributeName="opacity" values="0;0.9;0" dur="0.5s" begin="0.68s" fill="freeze"/>
                            <animate attributeName="x1" values="21;17" dur="0.5s" begin="0.68s" fill="freeze"/>
                            <animate attributeName="y1" values="21;17" dur="0.5s" begin="0.68s" fill="freeze"/>
                            <animate attributeName="x2" values="15;9"  dur="0.5s" begin="0.68s" fill="freeze"/>
                            <animate attributeName="y2" values="15;9"  dur="0.5s" begin="0.68s" fill="freeze"/>
                        </line>
                        <line x1="20" y1="68" x2="15" y2="73" stroke="#8ab0ff" stroke-width="1.2" stroke-linecap="round" opacity="0">
                            <animate attributeName="opacity" values="0;0.9;0" dur="0.5s" begin="0.68s" fill="freeze"/>
                            <animate attributeName="x1" values="21;17" dur="0.5s" begin="0.68s" fill="freeze"/>
                            <animate attributeName="y1" values="67;71" dur="0.5s" begin="0.68s" fill="freeze"/>
                            <animate attributeName="x2" values="15;9"  dur="0.5s" begin="0.68s" fill="freeze"/>
                            <animate attributeName="y2" values="73;79" dur="0.5s" begin="0.68s" fill="freeze"/>
                        </line>
                        <!-- Circle fill + draw-on + checkmark -->
                        <circle cx="44" cy="44" r="33" fill="rgba(91,140,247,0.09)" opacity="0">
                            <animate attributeName="opacity" values="0;1" dur="0.4s" begin="0s" fill="freeze"/>
                        </circle>
                        <circle cx="44" cy="44" r="33" fill="none" stroke="#5b8cf7" stroke-width="2.4"
                            stroke-linecap="round" stroke-dasharray="207.3" stroke-dashoffset="207.3" filter="url(#sg)">
                            <animate attributeName="stroke-dashoffset" from="207.3" to="0"
                                dur="0.58s" begin="0s" fill="freeze" calcMode="spline" keySplines="0.4 0 0.2 1"/>
                        </circle>
                        <path d="M29 45 L39 55.5 L61 30.5" fill="none" stroke="#5b8cf7" stroke-width="3"
                            stroke-linecap="round" stroke-linejoin="round"
                            stroke-dasharray="50" stroke-dashoffset="50" filter="url(#sg)">
                            <animate attributeName="stroke-dashoffset" from="50" to="0"
                                dur="0.38s" begin="0.5s" fill="freeze" calcMode="spline" keySplines="0.4 0 0.2 1"/>
                        </path>
                    </svg>
                </div>
                <p class="success-title">Password updated</p>
                <p class="success-body">You're now signed in. Head into the app whenever you're ready.</p>
                <button id="goto-app" class="btn">Go to app</button>
            </div>
        </div>
    </div>

    <div class="form-footer"><a href="/login_page">← Back to sign in</a></div>
</div>

<script>
document.addEventListener("DOMContentLoaded", () => {
    const loader      = document.getElementById("loader");
    const loaderLabel = document.getElementById("loader-label");
    const resetBtn    = document.getElementById("reset-password");
    const gotoAppBtn  = document.getElementById("goto-app");
    const errorBox    = document.getElementById("error-box");
    const pwInput     = document.getElementById("new-password");
    const cfInput     = document.getElementById("confirm-password");
    const pwTip       = document.getElementById("password-tip");
    const cfTip       = document.getElementById("confirm-tip");

    function setTip(el, msg, type) { el.innerHTML = msg; el.className = "tip visible " + (type || ""); }
    function hideTip(el) { el.className = "tip"; el.textContent = ""; }
    function showError(msg) {
        errorBox.textContent = msg; errorBox.classList.add("visible");
        errorBox.classList.remove("shake"); void errorBox.offsetWidth; errorBox.classList.add("shake");
    }
    function hideError() { errorBox.classList.remove("visible"); }
    function setLoading(on, label) {
        loader.classList.toggle("active", on);
        if (on && label) loaderLabel.textContent = label;
        if (resetBtn) resetBtn.disabled = on;
    }
    function showStep(n) {
        document.querySelectorAll(".step").forEach(el => el.classList.remove("active"));
        document.getElementById("step" + n).classList.add("active");
    }

    /* ── Password validation ── */
    function hasSequentialPattern(str) {
        if (str.length < 4) return false;
        str = str.toLowerCase();
        for (let i = 0; i <= str.length - 4; i++) {
            let asc = 1, desc = 1;
            for (let j = i; j < str.length - 1; j++) {
                if (str.charCodeAt(j) + 1 === str.charCodeAt(j+1)) { asc++;  if (asc  >= 4) return true; } else break;
            }
            for (let j = i; j < str.length - 1; j++) {
                if (str.charCodeAt(j) - 1 === str.charCodeAt(j+1)) { desc++; if (desc >= 4) return true; } else break;
            }
        }
        return false;
    }
    function hasExcessiveRepetition(str) { return /(.)\1{4,}/.test(str); }

    function checkPassword() {
        const pw = pwInput.value;
        if (pw === "") { hideTip(pwTip); pwInput.classList.remove("input-error","input-ok"); return false; }
        const rules = [
            [pw.length < 8,              "✖ At least 8 characters"],
            [!/[A-Z]/.test(pw),          "✖ At least one uppercase letter"],
            [!/[a-z]/.test(pw),          "✖ At least one lowercase letter"],
            [!/\d/.test(pw),             "✖ At least one digit"],
            [!/[!@#$%^&*]/.test(pw),     "✖ At least one special character (!@#$%^&*)"],
            [hasSequentialPattern(pw),   "✖ No sequential patterns (e.g., 1234 or abcd)"],
            [hasExcessiveRepetition(pw), "✖ No more than 4 identical consecutive characters"],
        ];
        for (const [fail, msg] of rules) {
            if (fail) {
                setTip(pwTip, msg, "error");
                pwInput.classList.add("input-error"); pwInput.classList.remove("input-ok"); return false;
            }
        }
        setTip(pwTip, "✔ Password is strong enough", "success");
        pwInput.classList.add("input-ok"); pwInput.classList.remove("input-error");
        if (cfInput.value) checkConfirm();
        return true;
    }

    function checkConfirm() {
        const cf = cfInput.value, pw = pwInput.value;
        if (cf === "") { hideTip(cfTip); cfInput.classList.remove("input-error","input-ok"); return false; }
        if (cf !== pw) {
            setTip(cfTip, "✖ Passwords do not match", "error");
            cfInput.classList.add("input-error"); cfInput.classList.remove("input-ok"); return false;
        }
        setTip(cfTip, "✔ Passwords match", "success");
        cfInput.classList.add("input-ok"); cfInput.classList.remove("input-error"); return true;
    }

    /* ── Feature flag ── */
    let pwReqEnabled = false;
    fetch("/password-eisen")
        .then(r => r.json())
        .then(data => {
            pwReqEnabled = data.enabled;
            if (pwReqEnabled) {
                pwInput.addEventListener("input", checkPassword);
                cfInput.addEventListener("input", checkConfirm);
            }
        })
        .catch(() => { pwReqEnabled = true; });

    /* ── Token validation ── */
    const token = new URLSearchParams(window.location.search).get("token");
    if (!token) { window.location.href = "/reset-password"; return; }

    (async () => {
        setLoading(true, "Verifying link…");
        try {
            const res  = await fetch("/reset_password/validate_token?token=" + encodeURIComponent(token));
            const data = await res.json().catch(() => ({}));
            if (!data.valid) { showError(data.error || "This reset link is invalid or has expired."); if (resetBtn) resetBtn.disabled = true; }
        } catch { showError("Unable to verify reset link. Check your connection."); if (resetBtn) resetBtn.disabled = true; }
        finally  { setLoading(false); }
    })();

    /* ── Submit ── */
    if (resetBtn) resetBtn.addEventListener("click", async () => {
        const pw = pwInput.value, cf = cfInput.value;
        if (!pw || !cf) { showError("Both fields are required."); return; }
        if (pwReqEnabled) {
            const pwOk = checkPassword(), cfOk = checkConfirm();
            if (!pwOk || !cfOk) { showError("Please fix the issues above before continuing."); return; }
        } else {
            if (pw.length < 8) { showError("Password must be at least 8 characters."); return; }
            if (pw !== cf)     { showError("Passwords do not match."); return; }
        }
        hideError(); setLoading(true, "Updating password…");
        try {
            const res = await fetch("/reset_password", {
                method: "POST", headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ token, new_password: pw })
            });
            if (res.ok) { setLoading(false); showStep(2); }
            else { const data = await res.json().catch(() => ({})); showError(data.error || "Failed to reset password."); }
        } catch { showError("Network error — please try again."); }
        finally  { setLoading(false); }
    });

    if (gotoAppBtn) gotoAppBtn.addEventListener("click", () => { window.location.href = "/index"; });
});
</script>
</body>
</html>
