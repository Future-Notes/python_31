<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <!-- keep viewport; mobile fixes below -->
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="theme-color" content="#3a3a3a" />
  <script src="/static/admin.js"></script>
  <title>Future Notes — Account</title>

  <style>
    /* -------------------------
       Color scheme (user req)
       ------------------------- */
    :root{
      --bg-color:  #2c2c2c;  /* page background */
      --hdr-color: #3a3a3a;  /* header / appbar */
      --ctr-color: #1e1e1e;  /* panels / contrast */
      --btn-color: #424242;  /* default button */
      --muted: #98a0ad;
      --text: #e6eef8;
      --accent: #4f83cc;
      --danger: #d9534f;
      --glass: rgba(255,255,255,0.03);
      --radius: 12px;
      --gap: 1rem;
      --max-inner-width: 1100px;
    }

    /* Safe defaults */
    *{box-sizing:border-box}
    body{
      margin:0;padding:env(safe-area-inset-top) 0.75rem 2rem 0.75rem;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial;
      background: linear-gradient(180deg,var(--bg-color), #07101a 120%);
      color:var(--text);
      -webkit-font-smoothing:antialiased;
      -moz-osx-font-smoothing:grayscale;
      display:flex;flex-direction:column;align-items:center;min-height:100vh;
      /* avoid unexpected zoom on iOS */
      -webkit-text-size-adjust:100%;
      -ms-text-size-adjust:100%;
    }

    /* Make main flex vertically, allow scroll */
    body {
      background: linear-gradient(180deg, var(--bg-color), #07101a);
      background-size: cover; /* scale to cover the whole area */
      background-repeat: no-repeat;
      min-height: 100%;
    }
    html, body { min-height: 100%; }

    /* Main container stays grid */
    main.container {
      width: 100%;
      max-width: var(--max-inner-width);
      margin: 80px auto 0; /* leave space for fixed header */
      display: grid;
      grid-template-columns: 1fr minmax(280px, 420px);
      gap: var(--gap);
      align-items: start;
      padding: 0.5rem;
    }

    /* Right panel: constrain max width and allow scroll internally */
    aside.panel {
      max-width: 420px;
      overflow-y: auto;
      min-height: 100%;
    }

    /* Optionally: allow sessions grid to scroll if too tall */
    .sessions-grid {
      max-height: 600px; /* adjust as needed */
      overflow-y: auto;
    }

    /* Appbar */
    header.appbar{
      position:fixed;left:0;right:0;top:0;height:64px;
      display:flex;align-items:center;gap:1rem;padding:0 0.75rem;
      background: linear-gradient(180deg,var(--hdr-color), rgba(0,0,0,0.05));
      border-bottom: 1px solid rgba(255,255,255,0.03); z-index:60;
      backdrop-filter: blur(6px);
    }
    .appbar .back{
      display:inline-grid;place-items:center;width:44px;height:44px;border-radius:10px;
      background:var(--glass);color:var(--text);text-decoration:none;font-weight:600;
      font-size:1.05rem;position:absolute;
    }
    .appbar h1{flex:1;margin:0;font-size:1.05rem;text-align:center;font-weight:600}

    /* main container: responsive with flexible sidebar */

    /* mobile first: single column (shrink second column) */
    @media (max-width:980px){
      main.container{grid-template-columns:1fr; padding:0.5rem;}
    }

    /* Panels */
    .panel{
      background:var(--ctr-color);
      border-radius:var(--radius);
      padding:0.9rem;
      box-shadow:0 6px 18px rgba(2,6,23,0.6);
      overflow:visible; /* remove internal scrollbars */
    }

    /* Profile header */
    .profile-card{
      display:flex;gap:0.75rem;align-items:center;padding:0.9rem;border-radius:12px;
      background:linear-gradient(90deg, rgba(79,131,204,0.06), rgba(79,131,204,0.01));
    }
    .avatar{
      width:56px;height:56px;border-radius:10px;
      background:linear-gradient(135deg,var(--accent),#2a6fb3);
      display:flex;align-items:center;justify-content:center;font-weight:700;font-size:1.1rem;color:#fff;flex-shrink:0;overflow:hidden
    }
    .profile-meta{flex:1}
    .profile-meta h2{margin:0;font-size:1rem}
    .profile-meta p{margin:4px 0 0;color:var(--muted);font-size:0.85rem}

    /* Forms and controls - unified styling */
    form.row{display:flex;gap:0.5rem;align-items:center}
    form .stack{width:100%}
    input[type=text], input[type=password], input[type=email], select, input[type=file]{
      width:100%;
      padding:10px 12px;
      border-radius:10px;
      border:1px solid rgba(255,255,255,0.04);
      background:transparent;
      color:var(--text);
      outline:none;
      font-size:15px; /* avoid iOS zoom */
      min-height:40px;
    }

    /* unify select + dropdown arrows */
    select{ -webkit-appearance:none; appearance:none; background-image: linear-gradient(45deg, transparent 50%, var(--muted) 50%), linear-gradient(135deg, var(--muted) 50%, transparent 50%); background-position: calc(100% - 16px) calc(1em + 2px), calc(100% - 11px) calc(1em + 2px); background-size: 6px 6px, 6px 6px; background-repeat: no-repeat; padding-right:36px; }

    /* Buttons */
    button{font-size:15px;min-height:40px;padding:9px 12px;border-radius:10px;border:none;cursor:pointer;display:inline-flex;align-items:center;gap:8px}
    .btn{background:var(--btn-color);color:var(--text);font-weight:700;box-shadow:0 2px 6px rgba(0,0,0,0.3)}
    .ghost{background:transparent;border:1px solid rgba(255,255,255,0.05);color:var(--text)}
    .danger{background:var(--danger);color:white}

    /* small text */
    .stack{display:flex;flex-direction:column;gap:0.6rem}
    .small{font-size:0.85rem;color:var(--muted)}

    /* toggle */
    .toggle{display:inline-flex;align-items:center;gap:0.6rem}
    .toggle input[type=checkbox]{width:40px;height:22px;appearance:none;background:rgba(255,255,255,0.06);border-radius:999px;position:relative;cursor:pointer;outline:none}
    .toggle input[type=checkbox]::after{content:"";position:absolute;left:3px;top:3px;width:16px;height:16px;border-radius:50%;background:white;transition:transform .18s}
    .toggle input[type=checkbox]:checked{background:var(--accent)}
    .toggle input[type=checkbox]:checked::after{transform:translateX(18px)}

    /* Sessions - responsive card grid instead of forced scrolling table */
    .sessions-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:0.5rem;gap:0.5rem}
    .sessions-actions{display:flex;gap:0.5rem;align-items:center}
    .sessions-grid{
      display:grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap:0.6rem;
      align-items:start;
      margin-top:6px;
    }
    .session-card{
      background: linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));
      padding:0.6rem;border-radius:10px;border:1px solid rgba(255,255,255,0.02);
      display:flex;flex-direction:column;gap:0.4rem;font-size:0.88rem;
    }
    .session-row{display:flex;justify-content:space-between;align-items:center;gap:0.5rem}
    .session-meta{display:flex;flex-direction:column;gap:0.15rem;min-width:0}
    .session-actions{display:flex;gap:0.5rem;align-items:center}

    /* compact badges and truncation */
    .badge{padding:6px 8px;border-radius:8px;background:rgba(0,0,0,0.2);font-size:0.78rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .muted{color:var(--muted);font-size:0.8rem}
    .small-ellipsis{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:block;min-width:0}

    /* Color settings layout */
    .colors-grid{display:grid;grid-template-columns:1fr 56px;gap:0.5rem;align-items:center}
    .swatch{width:44px;height:44px;border-radius:8px;border:1px solid rgba(0,0,0,0.25)}

    hr.sep{margin:12px 0;border:none;border-top:1px solid rgba(255,255,255,0.03)}

/* ---------- tip styles + shake (added) ---------- */
.tip{
  display:none;
  margin-top:6px;
  padding:8px 10px;
  border-radius:8px;
  font-size:0.9rem;
  line-height:1.3;
  border:1px solid transparent;
}
.tip.visible{display:block}
.tip.error{ color:var(--danger); background: rgba(217,83,79,0.06); border-color: rgba(217,83,79,0.14); }
.tip.success{ color:#7bd58c; background: rgba(123,213,140,0.06); border-color: rgba(107,201,122,0.12); }

@keyframes shake {
  0%   { transform: translateX(0); }
  25%  { transform: translateX(-6px); }
  50%  { transform: translateX(6px); }
  75%  { transform: translateX(-6px); }
  100% { transform: translateX(0); }
}
.shake { animation: shake 0.35s; }

/* utilities */
footer{max-width:var(--max-inner-width);width:100%;margin-top:1rem;color:var(--muted);font-size:0.9rem;text-align:center}

/* hide default scrollbars gracefully (only if any appear) */
::-webkit-scrollbar{height:0; width:0}
html{scrollbar-width:none}
input, select, button, textarea { font-size:16px; }

/* Accessibility focus */
:focus{outline:2px solid rgba(79,131,204,0.25);outline-offset:2px}

/* small responsive tweaks */
@media (max-width:480px){
  .appbar h1{font-size:1rem}
  .profile-card{padding:0.6rem}
  .avatar{width:48px;height:48px}
  .session-card{font-size:0.85rem}
}
    .color-section {
      grid-column: 1 / -1; /* spans all columns */
    }
    @media (max-width:980px){
      .color-section {
        grid-column: auto; /* default single column */
      }
      aside.panel {
        max-width: 100%;
      }
    }

  </style>
</head>
<body>
  <header class="appbar">
    <a href="/index" class="back" id="back">←</a>
    <h1>Account</h1>
  </header>

  <main class="container">
    <!-- left: profile + account management -->
    <section class="panel">
      <div class="profile-card">
        <div class="avatar" id="profile-pic">U</div>
        <div class="profile-meta">
          <h2 id="username-display">Loading…</h2>
          <p id="email-display" class="small">…</p>
        </div>
        <div style="display:flex;flex-direction:column;gap:0.4rem">
          <button class="ghost" id="btn-change-pic">Change</button>
          <button class="ghost" id="btn-remove-pic">Remove</button>
        </div>
      </div>

      <div style="margin-top:0.9rem" class="stack">
        <label class="small">Username</label>
        <form id="form-username" class="row">
          <input type="text" id="new-username" required />
          <button class="btn" type="submit">Save</button>
        </form>
        <!-- username inline tip -->
        <div id="username-tip" class="tip" aria-live="polite"></div>

        <label class="small">Email</label>
        <form id="form-email" class="row">
          <input type="email" id="new-email" />
          <button class="btn" type="submit">Update</button>
        </form>

        <label class="small">Change password</label>
        <form id="form-password" class="stack">
          <input type="password" id="current-password" placeholder="Current password" required />
          <input type="password" id="new-password" placeholder="New password" required />
          <!-- password inline tip -->
          <div id="password-tip" class="tip" aria-live="polite"></div>

          <div style="display:flex;gap:0.5rem;justify-content:flex-end">
            <button class="btn" type="submit">Change</button>
          </div>
        </form>

        <div style="display:flex;gap:0.5rem;align-items:center;justify-content:space-between;margin-top:0.5rem">
          <div>
            <div class="toggle">
              <input type="checkbox" id="sharing-toggle" aria-label="Allow sharing" />
            </div>
            <div class="small">Allow sharing notes</div>
          </div>

          <div style="text-align:right">
            <label class="small">Default start page</label>
            <select id="default-startpage" aria-label="Default startpage">
              <option value="/index">Personal notes</option>
              <option value="/group-notes">Group notes</option>
              <option value="/scheduler-page">Scheduler</option>
              <option value="/todo_page">Todo</option>
              <option value="/pws">Zeeslag (Battleship)</option>
            </select>
          </div>
        </div>

        <div style="display:flex;gap:0.5rem;margin-top:0.75rem">
          <a href="/2fa_page" class="ghost" style="padding:10px 12px;border-radius:10px;text-decoration:none;display:inline-flex;align-items:center">Two-factor authentication</a>
          <a id="admin-link" class="ghost" style="display:inline-flex;align-items:center;padding:10px 12px;border-radius:10px;opacity:0.7;pointer-events:none">Admin Page</a>
        </div>

        <div style="display:flex;gap:0.5rem;margin-top:0.75rem;justify-content:space-between">
          <button class="danger" id="btn-delete">Delete account</button>
          <button class="ghost" id="btn-logout">Logout</button>
        </div>
      </div>

      <!-- hidden file input for profile pic -->
      <input id="profile-input" type="file" accept="image/*" style="display:none" />
    </section>

    <!-- right: sessions + color settings -->
    <aside class="panel">
      <div class="sessions-header">
        <h3 style="margin:0">Active sessions</h3>
        <div class="sessions-actions">
          <button class="ghost" id="refresh-sessions">Refresh</button>
          <button class="danger" id="revoke-all">Revoke all</button>
        </div>
      </div>

      <!-- sessions grid + show-all control -->
      <div id="sessions-wrapper">
        <div class="sessions-grid" id="sessions-grid">
          <!-- JS will render compact .session-card elements here -->
          <div style="grid-column:1/-1;color:var(--muted);text-align:center;padding:8px" id="sessions-loading">Loading…</div>
        </div>

        <div style="display:flex;justify-content:center;margin-top:8px">
          <button class="ghost" id="sessions-toggle" style="display:none">Show all</button>
        </div>
      </div>

      </aside>
      <section class="panel color-section">
    <h3 style="margin:0 0 8px 0">Color settings</h3>
    <div class="small" style="margin-bottom:8px">Choose a preset or set custom colors. Changes are saved to your account.</div>

    <div style="display:flex;gap:0.5rem;margin-bottom:0.5rem">
      <select id="color-presets">
        <option value="custom">Custom</option>
        <option value="default">Future Notes — Default</option>
        <option value="colorful">Future Notes — Colorful</option>
        <option value="light">Future Notes — Light</option>
      </select>
      <button class="btn" id="save-colors">Save</button>
    </div>

    <div style="display:grid;gap:0.5rem">
      <div class="colors-grid">
        <input id="background-color" type="text" pattern="^#([A-Fa-f0-9]{6})$" placeholder="#2c2c2c" />
        <div class="swatch" id="background-swatch"></div>
      </div>
      <div class="colors-grid">
        <input id="header-color" type="text" pattern="^#([A-Fa-f0-9]{6})$" placeholder="#3a3a3a" />
        <div class="swatch" id="header-swatch"></div>
      </div>
      <div class="colors-grid">
        <input id="contrast-color" type="text" pattern="^#([A-Fa-f0-9]{6})$" placeholder="#1e1e1e" />
        <div class="swatch" id="contrast-swatch"></div>
      </div>
      <div class="colors-grid">
        <input id="button-color" type="text" pattern="^#([A-Fa-f0-9]{6})$" placeholder="#424242" />
        <div class="swatch" id="button-swatch"></div>
      </div>
    </div>

  </section>
  </main>

  <!-- modals / overlays -->
  <div class="overlay" id="overlay" role="dialog" aria-hidden="true" style="display:none">
    <div class="dialog" id="dialog-content"></div>
  </div>

  <footer>&copy; Future Notes</footer>

  <script>
    // small utility helpers (unchanged)
    const $ = sel => document.querySelector(sel);
    const $$ = sel => Array.from(document.querySelectorAll(sel));

    // ensure fetch sends cookies by default
    (function(){
      const orig = window.fetch;
      window.fetch = (input, init={}) => {
        init.credentials = init.credentials || 'include';
        return orig(input, init);
      };
    })();

    /* -------------------------
       DOM references (unchanged naming)
       ------------------------- */
    const usernameDisplay = $('#username-display');
    const emailDisplay = $('#email-display');
    const avatar = $('#profile-pic');
    const fileInput = $('#profile-input');
    const btnChangePic = $('#btn-change-pic');
    const btnRemovePic = $('#btn-remove-pic');

    const formUsername = $('#form-username');
    const formEmail = $('#form-email');
    const formPassword = $('#form-password');

    const newUsernameInput = $('#new-username');
    const currentPasswordInput = $('#current-password');
    const newPasswordInput = $('#new-password');

    const usernameTip = $('#username-tip');
    const passwordTip = $('#password-tip');

    const sharingToggle = $('#sharing-toggle');
    const defaultStart = $('#default-startpage');

    const refreshSessionsBtn = $('#refresh-sessions');
    const revokeAllBtn = $('#revoke-all');

    const adminLink = $('#admin-link');

    const colorInputs = {
      bg: $('#background-color'),
      hdr: $('#header-color'),
      ctr: $('#contrast-color'),
      btn: $('#button-color')
    };
    const swatches = {
      bg: $('#background-swatch'), hdr: $('#header-swatch'), ctr: $('#contrast-swatch'), btn: $('#button-swatch')
    };
    const presetSelect = $('#color-presets');
    const saveColorsBtn = $('#save-colors');

    // small additions for sessions rendering
    const sessionsGrid = $('#sessions-grid');
    const sessionsLoading = $('#sessions-loading');
    const sessionsToggle = $('#sessions-toggle');

    // presets
    const PRESETS = {
      default: { bg: '#2c2c2c', hdr: '#3a3a3a', ctr: '#1e1e1e', btn: '#424242' },
      colorful: { bg: '#121212', hdr: '#2e7d32', ctr: '#1b5e20', btn: '#388e3c' },
      light: { bg:'#dfe7ec', hdr:'#cfd8df', ctr:'#ffffff', btn:'#bdbdbd' }
    };

    function setSwatch(key, val){ if(swatches[key]) swatches[key].style.background = val; }

    function showDialog(html){ $('#overlay').style.display='flex'; $('#dialog-content').innerHTML = html; $('#overlay').setAttribute('aria-hidden','false'); }
    function hideDialog(){ $('#overlay').style.display='none'; $('#dialog-content').innerHTML=''; $('#overlay').setAttribute('aria-hidden','true'); }

    function isHex(v){ return /^#([A-Fa-f0-9]{6})$/.test((v||'').trim()); }

    async function validateSession(){
      try{
        const res = await fetch('/test-session');
        if (res.status === 200) return true;
        if (res.status === 403) { window.location.href = '/login_page?suspended=true'; return false; }
        return false;
      }catch(e){ console.error('validateSession',e); return false; }
    }

    async function attemptAutoLogin(){
      try{
        const res = await fetch('/login', { method: 'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({}) });
        if (res.ok){ window.location.reload(); return true; }
        return false;
      }catch(e){ console.error('autologin',e); return false; }
    }

    // ---------- USERNAME & PASSWORD VALIDATION (copied/adapted from signup) ----------
    let currentUsername = null;
    let passwordRequirementsEnabled = false;

    function setTip(el, msg, type) {
      if (!el) return;
      el.innerHTML = msg;
      el.className = 'tip visible ' + (type || '');
    }
    function hideTip(el) {
      if (!el) return;
      el.className = 'tip';
      el.textContent = '';
    }

    function hasSequentialPattern(str) {
      if (!str || str.length < 4) return false;
      str = str.toLowerCase();

      for (let i = 0; i <= str.length - 4; i++) {

        let asc = 1;
        let desc = 1;

        for (let j = i; j < str.length - 1; j++) {
          if (str.charCodeAt(j) + 1 === str.charCodeAt(j + 1)) {
            asc++;
            if (asc >= 4) return true;
          } else break;
        }

        for (let j = i; j < str.length - 1; j++) {
          if (str.charCodeAt(j) - 1 === str.charCodeAt(j + 1)) {
            desc++;
            if (desc >= 4) return true;
          } else break;
        }
      }

      return false;
    }

    function hasExcessiveRepetition(str) {
      return /(.)\1{4,}/.test(str);
    }

    function debounce(fn, delay) {
      let timer = null;
      return function (...args) {
        clearTimeout(timer);
        timer = setTimeout(() => fn.apply(this, args), delay);
      };
    }

    async function checkUsername(showTip = true) {
      const username = (newUsernameInput.value || '').trim();

      if (username === "") {
        if (showTip) hideTip(usernameTip);
        return false;
      }

      if (username.length > 80) {
        if (showTip) { setTip(usernameTip, "✖ Username cannot be longer than 80 characters", "error shake"); setTimeout(()=>usernameTip.classList.remove('shake'),500); }
        return false;
      }

      if (/_/.test(username)) {
        if (showTip) { setTip(usernameTip, "✖ Underscores are not allowed in the username", "error shake"); setTimeout(()=>usernameTip.classList.remove('shake'),500); }
        return false;
      }

      if (username.length < 3) {
        if (showTip) { setTip(usernameTip, "✖ Username must be at least 3 characters long", "error shake"); setTimeout(()=>usernameTip.classList.remove('shake'),500); }
        return false;
      }

      if (!/[A-Za-z]/.test(username)) {
        if (showTip) { setTip(usernameTip, "✖ Username must contain at least one letter", "error shake"); setTimeout(()=>usernameTip.classList.remove('shake'),500); }
        return false;
      }

      // If user didn't actually change username, consider it valid
      if (currentUsername && username === currentUsername) {
        if (showTip) setTip(usernameTip, "✔ Username is unchanged", "success");
        return true;
      }

      // call backend to check
      try {
        const res = await fetch(`/username-check/${encodeURIComponent(username)}`);
        if (!res.ok) throw new Error('network');
        const data = await res.json();

        if (data.exists) {
          if (showTip) { setTip(usernameTip, "✖ Username is already taken", "error shake"); setTimeout(()=>usernameTip.classList.remove('shake'),500); }
          return false;
        } else if (data.protected) {
          if (showTip) {
            if (data.reason === "Profanity") setTip(usernameTip, "✖ Username contains inappropriate language", "error shake");
            else setTip(usernameTip, "✖ Username is not allowed or too similar to a protected name. <a href='/why-protected-usernames'>Learn more</a>", "error shake");
            setTimeout(()=>usernameTip.classList.remove('shake'),500);
          }
          return false;
        }
      } catch (e) {
        if (showTip) { setTip(usernameTip, "✖ Error checking username", "error shake"); setTimeout(()=>usernameTip.classList.remove('shake'),500); }
        return false;
      }

      if (showTip) setTip(usernameTip, "✔ Username is valid", "success");
      return true;
    }

    function checkPassword(showTip = true) {
      const password = newPasswordInput.value || '';

      if (password === "") {
        if (showTip) hideTip(passwordTip);
        return false;
      }

      if (password.length < 8) {
        if (showTip) setTip(passwordTip, "✖ At least 8 characters", "error");
        return false;
      }

      if (!/[A-Z]/.test(password)) {
        if (showTip) setTip(passwordTip, "✖ At least one uppercase letter", "error");
        return false;
      }

      if (!/[a-z]/.test(password)) {
        if (showTip) setTip(passwordTip, "✖ At least one lowercase letter", "error");
        return false;
      }

      if (!/\d/.test(password)) {
        if (showTip) setTip(passwordTip, "✖ At least one digit", "error");
        return false;
      }

      if (!/[!@#$%^&*]/.test(password)) {
        if (showTip) setTip(passwordTip, "✖ At least one special character (!@#$%^&*)", "error");
        return false;
      }

      if (hasSequentialPattern(password)) {
        if (showTip) setTip(passwordTip, "✖ No sequential patterns allowed (e.g., 1234 or abcd)", "error");
        return false;
      }

      if (hasExcessiveRepetition(password)) {
        if (showTip) setTip(passwordTip, "✖ No more than 4 identical consecutive characters allowed", "error");
        return false;
      }

      if (showTip) setTip(passwordTip, "✔ Password is strong enough", "success");
      return true;
    }

    const debouncedCheckUsername = debounce(checkUsername, 400);

    // query server to see whether password rules are enabled
    (function initPasswordRequirementFlag(){
      fetch("/password-eisen")
        .then(r => r.json())
        .then(data => {
          passwordRequirementsEnabled = !!data.enabled;
          if (passwordRequirementsEnabled) {
            newPasswordInput.addEventListener("input", () => checkPassword(true));
            newUsernameInput.addEventListener("input", debouncedCheckUsername);
          }
        })
        .catch(() => {
          // If the request fails, default to enabling requirements
          passwordRequirementsEnabled = true;
          newPasswordInput.addEventListener("input", () => checkPassword(true));
          newUsernameInput.addEventListener("input", debouncedCheckUsername);
        });
    })();

    // ---------- end validation code ----------

    async function init(){
      const ok = await validateSession();
      if (!ok){ const got = await attemptAutoLogin(); if (!got) { window.location.href = '/login_page?redirect=/account_page&warning=true'; return; } return; }

      // fetch user-info
      try{
        const r = await fetch('/user-info');
        if (!r.ok) throw new Error('user-info failed');
        const u = await r.json();
        populateUser(u);
      }catch(e){ console.error(e); }

      // load user colors from api (if available)
      try{
        const r = await fetch('/api/user/colors'); if (r.ok){ const d = await r.json(); const cur = { bg: d.backgroundColor, hdr: d.headerColor, ctr: d.contrastingColor, btn: d.buttonColor };
          Object.entries(cur).forEach(([k,v])=>{ if(v && colorInputs[k]){ colorInputs[k].value = v; setSwatch(k,v); } });
          // try to match preset
          for(const key of Object.keys(PRESETS)){ const p=PRESETS[key]; if(p.bg===cur.bg && p.hdr===cur.hdr && p.ctr===cur.ctr && p.btn===cur.btn){ presetSelect.value = key; break; } }
        }
      }catch(e){ console.warn('no user colors',e); }

      // initial sessions
      fetchSessions();
    }

    function populateUser(u){
      usernameDisplay.textContent = u.username + ' — Account';
      currentUsername = u.username || null;
      const letter = (u.username && u.username[0]) ? u.username[0].toUpperCase() : 'U';
      emailDisplay.textContent = u.email || 'No email set';

      if (u.profile_picture){ avatar.style.backgroundImage = `url(${u.profile_picture.replace(/\\/g,'/')})`; avatar.textContent=''; avatar.style.backgroundSize='cover'; }
      else { avatar.style.backgroundImage='none'; avatar.textContent = letter; }

      sharingToggle.checked = !!u.allows_sharing;
      defaultStart.value = u.startpage || '/index';
      $('#new-username').value = u.username || '';
      if (u.email) $('#new-email').value = u.email;

      if (u.role === 'admin'){ adminLink.style.pointerEvents='auto'; adminLink.style.opacity=1; adminLink.href='/admin_page'; }
    }

    // ---------- forms ---------- (modified to validate before submit)
    formUsername.addEventListener('submit', async e =>{
      e.preventDefault();
      const newUsername = (newUsernameInput.value || '').trim();

      // run the same validation & backend check as signup
      const ok = await checkUsername(true);
      if (!ok) {
        // visual shake
        usernameTip.classList.remove('shake'); void usernameTip.offsetWidth; usernameTip.classList.add('shake');
        return;
      }

      try{
        const res = await fetch('/update-username', { method:'PUT', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ new_username: newUsername }) });
        if (res.ok){ alert('Username updated'); usernameDisplay.textContent = newUsername + ' — Account'; currentUsername = newUsername; }
        else if (res.status===401){ sessionStorage.clear(); window.location.href='/login_page'; }
        else { const j = await res.json().catch(()=>({})); alert(j.error||'Failed to update username'); }
      }catch(e){ alert('Network error'); }
    });

    formEmail.addEventListener('submit', async e =>{
      e.preventDefault(); const email = $('#new-email').value.trim();
      try{
        const res = await fetch('/account/update_email', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ email }) });
        if (res.ok){ alert('Verification sent — follow the email'); } else { const j = await res.json().catch(()=>({})); alert(j.error||'Failed to update email'); }
      }catch(e){ alert('Network error'); }
    });

    formPassword.addEventListener('submit', async e =>{
      e.preventDefault();
      const cur = currentPasswordInput.value || '';
      const nw = newPasswordInput.value || '';

      if (passwordRequirementsEnabled) {
        const passOk = checkPassword(true);
        if (!passOk) {
          passwordTip.classList.remove('shake'); void passwordTip.offsetWidth; passwordTip.classList.add('shake');
          return;
        }
      }

      try{
        const res = await fetch('/update-password', { method:'PUT', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ current_password: cur, new_password: nw }) });
        if (res.ok){ alert('Password updated'); formPassword.reset(); hideTip(passwordTip); } else if (res.status===401){ alert('Session expired'); sessionStorage.clear(); window.location.href='/login_page'; } else { const j = await res.json().catch(()=>({})); alert(j.error||'Could not update password'); }
      }catch(e){ alert('Network error'); }
    });

    // sharing toggle
    sharingToggle.addEventListener('change', async e =>{
      try{
        const resp = await fetch('/allow-sharing', { method:'PUT', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ allows_sharing: e.target.checked }) });
        if (!resp.ok){ if (resp.status===401){ sessionStorage.clear(); window.location.href='/login_page'; } else alert('Failed to update sharing preference'); }
      }catch(e){ console.error(e); }
    });

    // default startpage
    defaultStart.addEventListener('change', async e =>{
      try{
        const resp = await fetch('/update-set-startpage', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ startpage: e.target.value }) });
        if (!resp.ok){ if (resp.status===401){ sessionStorage.clear(); window.location.href='/login_page'; } else alert('Failed to set start page'); }
      }catch(e){ console.error(e); }
    });

    // ---------- profile picture ----------
    btnChangePic.addEventListener('click', ()=> fileInput.click());
    fileInput.addEventListener('change', async () =>{
      if (!fileInput.files || fileInput.files.length===0) return;
      const fd = new FormData(); fd.append('profile_picture', fileInput.files[0]);
      try{
        const r = await fetch('/update-profile-picture', { method:'POST', body: fd });
        if (r.ok){ alert('Profile picture updated'); window.location.reload(); } else if (r.status===401){ sessionStorage.clear(); window.location.href='/login_page'; } else { alert('Failed to upload picture'); }
      }catch(e){ console.error(e); alert('Upload failed'); }
    });

    btnRemovePic.addEventListener('click', async () =>{
      if (!confirm('Delete profile picture?')) return;
      try{
        const r = await fetch('/update-profile-picture', { method:'DELETE' });
        if (r.ok){ alert('Deleted'); window.location.reload(); } else alert('Failed to delete');
      }catch(e){ console.error(e); }
    });

    // ---------- sessions (rewired to cards + show-more) ----------
    function safe(v){ return (v===null||v===undefined||v==='') ? '—' : v; }
    function isoFmt(iso){ if(!iso) return '—'; try{ const d=new Date(iso); return d.toLocaleString(); }catch(e){ return iso; } }
    function iso2Flag(iso2){ if(!iso2) return ''; return iso2.toUpperCase().split('').map(c=>String.fromCodePoint(127397 + c.charCodeAt())).join(''); }

    // config: how many cards to show by default
    const DEFAULT_VISIBLE_SESSIONS = 6;
    let allSessionsCache = [];

    async function fetchSessions(){
      // show loading
      sessionsGrid.innerHTML = '<div id="sessions-loading" style="grid-column:1/-1;color:var(--muted);text-align:center;padding:8px">Loading…</div>';
      sessionsToggle.style.display = 'none';
      try{
        const r = await fetch('/account/sessions');
        if (r.status===401||r.status===403){ sessionsGrid.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:12px;color:var(--muted)">Unauthorized — please login</div>'; return; }
        if (!r.ok) throw new Error('failed');
        const j = await r.json(); renderSessions(j.sessions || []);
      }catch(e){ console.error(e); sessionsGrid.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:12px;color:var(--muted)">Could not load sessions</div>'; }
    }

    function renderSessions(list){
      allSessionsCache = Array.isArray(list) ? list : [];
      if (!Array.isArray(list) || list.length===0){
        sessionsGrid.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:12px;color:var(--muted)">No active sessions</div>';
        sessionsToggle.style.display = 'none';
        return;
      }

      // determine whether we need toggle
      const needToggle = list.length > DEFAULT_VISIBLE_SESSIONS;
      sessionsGrid.innerHTML = '';
      const visibleList = needToggle ? list.slice(0, DEFAULT_VISIBLE_SESSIONS) : list;

      for(const s of visibleList) sessionsGrid.appendChild(makeSessionCard(s));

      if (needToggle){
        sessionsToggle.style.display = 'inline-block';
        sessionsToggle.textContent = `Show all (${list.length})`;
      } else {
        sessionsToggle.style.display = 'none';
      }
    }

    function makeSessionCard(s){
      const card = document.createElement('div');
      card.className = 'session-card';

      const header = document.createElement('div'); header.className='session-row';
      const cur = document.createElement('div'); cur.innerHTML = s.is_current ? '<strong>Current</strong>' : '<span class="muted">Inactive</span>';
      const created = document.createElement('div'); created.className='muted'; created.textContent = isoFmt(s.created_at);
      header.append(cur, created);

      const uaDiv = document.createElement('div'); uaDiv.className='session-meta';
      const uaMain = document.createElement('div'); uaMain.className='small-ellipsis'; uaMain.textContent = safe(s.user_agent_simplified);
      const uaFull = document.createElement('div'); uaFull.className='muted small-ellipsis'; uaFull.textContent = safe(s.user_agent);
      uaDiv.append(uaMain, uaFull);

      const ipDiv = document.createElement('div'); ipDiv.className='session-meta';
      const ipMain = document.createElement('div'); ipMain.className='badge'; ipMain.textContent = safe(s.ip_address);
      const ipSub = document.createElement('div'); ipSub.className='muted'; ipSub.textContent = `${iso2Flag(s.country_code)} ${safe(s.country_name)}`;
      ipDiv.append(ipMain, ipSub);

      const footer = document.createElement('div'); footer.className='session-row';
      const fp = document.createElement('div'); fp.className='muted'; fp.textContent = `FP: ${safe(s.fingerprint)}`;
      const act = document.createElement('div'); act.className='session-actions';
      const btn = document.createElement('button'); btn.className='ghost'; btn.textContent = s.is_current ? 'Revoke (current)' : 'Revoke';
      btn.addEventListener('click', ()=> onRevokeClicked(s, card, btn));
      act.appendChild(btn);

      footer.append(fp, act);

      card.append(header, uaDiv, ipDiv, footer);
      return card;
    }

    // toggle show all / collapse
    sessionsToggle.addEventListener('click', ()=>{
      if (sessionsToggle.dataset.expanded === '1'){
        // collapse
        renderSessions(allSessionsCache);
        sessionsToggle.dataset.expanded = '0';
        sessionsToggle.textContent = `Show all (${allSessionsCache.length})`;
      } else {
        // expand fully: clear grid and append all
        sessionsGrid.innerHTML = '';
        for(const s of allSessionsCache) sessionsGrid.appendChild(makeSessionCard(s));
        sessionsToggle.dataset.expanded = '1';
        sessionsToggle.textContent = 'Collapse';
      }
    });

    async function onRevokeClicked(sessionObj, cardEl, btnEl){
      const id = sessionObj.id; const isCurrent = !!sessionObj.is_current;
      const confirmMsg = isCurrent ? 'Revoking the current session will log you out of this browser. Continue?' : `Revoke session from ${safe(sessionObj.ip_address)} (${safe(sessionObj.user_agent_simplified)})?`;
      if (!confirm(confirmMsg)) return;
      btnEl.disabled = true; btnEl.textContent = 'Revoking…';
      try{
        const res = await fetch(`/account/sessions/${id}/revoke`, { method:'POST' });
        if (res.status===401){ alert('Session expired — please log in'); window.location.href='/login_page?redirect=/account_page&warning=true'; return; }
        if (!res.ok){ const j = await res.json().catch(()=>({})); alert('Could not revoke: '+(j.error||res.statusText)); btnEl.disabled=false; btnEl.textContent = isCurrent? 'Revoke (current)':'Revoke'; return; }
        // remove the card from UI and update cache
        if (cardEl && cardEl.parentNode) cardEl.parentNode.removeChild(cardEl);
        allSessionsCache = allSessionsCache.filter(s=> s.id !== sessionObj.id);
        if (isCurrent){ try{ sessionStorage.clear(); localStorage.removeItem('lasting_key'); }catch(e){} window.location.href = '/login_page?revoked_current=true'; }
      }catch(e){ console.error(e); alert('Network error'); btnEl.disabled=false; btnEl.textContent = isCurrent? 'Revoke (current)':'Revoke'; }
    }

    revokeAllBtn.addEventListener('click', async ()=>{
      if (!confirm('Revoke ALL sessions (this will log you out on every device)?')) return;
      try{
        const r = await fetch('/account/sessions/revoke_all', { method:'POST' });
        if (r.status===401){ alert('Session expired'); window.location.href='/login_page'; return; }
        if (!r.ok){ const j = await r.json().catch(()=>({})); alert('Could not revoke all: '+(j.error||r.statusText)); return; }
        try{ sessionStorage.clear(); localStorage.removeItem('lasting_key'); }catch(e){}
        window.location.href = '/login_page?revoked_all=true';
      }catch(e){ console.error(e); alert('Network error'); }
    });

    refreshSessionsBtn.addEventListener('click', fetchSessions);

    // ---------- delete & logout ----------
    $('#btn-delete').addEventListener('click', async ()=>{
      const pw = prompt('Enter your password to confirm:'); if (pw===null) return;
      try{
        const r = await fetch('/delete-account', { method:'DELETE', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ password: pw }) });
        if (r.status===200){ sessionStorage.clear(); localStorage.removeItem('lasting_key'); window.location.href='/login_page'; }
        else if (r.status===401){ sessionStorage.clear(); window.location.href='/login_page'; }
        else if (r.status===400){ alert('Incorrect password'); }
        else { alert('Error deleting account'); }
      }catch(e){ alert('Network error'); }
    });

    $('#btn-logout').addEventListener('click', ()=>{ fetch('/logout', { method:'POST' }); sessionStorage.clear(); window.location.href='/login_page'; });

    // ---------- color settings ----------
    Object.entries(colorInputs).forEach(([k,el])=>{
      el.addEventListener('input', ()=>{ const v = el.value.trim(); if(isHex(v)){ setSwatch(k,v); } });
    });

    presetSelect.addEventListener('change', ()=>{
      const val = presetSelect.value; if (val==='custom') return; const p = PRESETS[val]; Object.keys(colorInputs).forEach(k=>{ colorInputs[k].value = p[k]; setSwatch(k,p[k]); });
    });

    saveColorsBtn.addEventListener('click', async ()=>{
      const payload = { background: colorInputs.bg.value.trim(), header: colorInputs.hdr.value.trim(), contrast: colorInputs.ctr.value.trim(), buttons: colorInputs.btn.value.trim() };
      if (!isHex(payload.background)||!isHex(payload.header)||!isHex(payload.contrast)||!isHex(payload.buttons)){ alert('Please use full 6-digit hex colors (e.g. #1a2b3c)'); return; }
      try{
        const r = await fetch('/api/set-colors', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(payload) });
        if (r.ok){ alert('Colors saved'); window.location.reload(); }
        else if (r.status===401){ sessionStorage.clear(); window.location.href='/login_page'; }
        else { const j = await r.json().catch(()=>({})); alert(j.error||'Failed to save colors'); }
      }catch(e){ console.error(e); alert('Network error'); }
    });

    // live input hooks (connect debounced username check & password check if password reqs enabled)
    newUsernameInput.addEventListener('input', debouncedCheckUsername);
    newPasswordInput.addEventListener('input', () => { if (passwordRequirementsEnabled) checkPassword(true); });

    // initial run
    document.addEventListener('DOMContentLoaded', ()=> init());
  </script>
</body>
</html>
