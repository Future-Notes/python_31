<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#2c2c2c">
  <title>Future Notes - Sign Up</title>
  <link rel="apple-touch-icon" sizes="180x180" href="static/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="static/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="static/favicon-16x16.png">
  <link rel="favicon" type="image/x-icon" href="static/favicon.ico">
  <link rel="manifest" href="static/site.webmanifest">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
  <script src="/static/js/loader.js"></script>
  <script src="/static/js/check.js"></script>
  <style>
    :root {
      --bg-color:  #2c2c2c;
      --hdr-color: #3a3a3a;
      --ctr-color: #1e1e1e;
      --btn-color: #424242;

      --accent:       #5b8cf7;
      --accent-dim:   rgba(91,140,247,0.15);
      --accent-glow:  rgba(91,140,247,0.22);
      --text-primary: #e8e8e8;
      --text-muted:   #9a9a9a;
      --text-dim:     #606060;
      --border:       rgba(255,255,255,0.07);
      --border-hover: rgba(255,255,255,0.13);
      --danger:       #e07070;
      --danger-bg:    rgba(224,112,112,0.08);
      --success:      #6bc97a;
      --success-bg:   rgba(107,201,122,0.08);
      --radius:       8px;
      --radius-sm:    6px;
      --ease:         cubic-bezier(0.4,0,0.2,1);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { height: 100%; }

    body {
      background-color: var(--bg-color);
      color: var(--text-primary);
      font-family: 'Outfit', sans-serif;
      font-weight: 400;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
      position: relative;
      overflow-x: hidden;
    }

    /* Subtle vignette */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse 90% 80% at 50% 50%,
          transparent 30%,
          rgba(10,10,10,0.35) 100%);
      pointer-events: none;
      z-index: 0;
    }

    /* Faint accent wash */
    body::after {
      content: '';
      position: fixed;
      top: -120px;
      left: 50%;
      transform: translateX(-50%);
      width: 600px;
      height: 400px;
      background: radial-gradient(ellipse, rgba(91,140,247,0.055) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    /* ── Back button ── */
    .back-button {
      position: fixed;
      top: 20px;
      left: 20px;
      width: 38px;
      height: 38px;
      background: var(--hdr-color);
      border: 1px solid var(--border);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-muted);
      text-decoration: none;
      font-size: 17px;
      font-family: 'Outfit', sans-serif;
      transition: background 0.2s var(--ease), color 0.2s var(--ease), border-color 0.2s var(--ease);
      z-index: 10;
    }
    .back-button:hover {
      background: var(--btn-color);
      border-color: var(--border-hover);
      color: var(--text-primary);
    }

    /* ── Page wrapper ── */
    .page-wrapper {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 400px;
      opacity: 0;
      transform: translateY(14px);
      animation: revealUp 0.55s var(--ease) 0.05s forwards;
    }

    @keyframes revealUp {
      to { opacity: 1; transform: translateY(0); }
    }

    /* ── Logo / heading area ── */
    .logo-area {
      text-align: center;
      margin-bottom: 28px;
    }

    .logo-icon {
      width: 46px;
      height: 46px;
      background: var(--ctr-color);
      border: 1px solid var(--border-hover);
      border-radius: 12px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 14px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.3), 0 0 0 1px rgba(255,255,255,0.04) inset;
    }

    .logo-icon svg {
      width: 22px;
      height: 22px;
    }

    .logo-area h1 {
      font-size: 22px;
      font-weight: 600;
      color: var(--text-primary);
      letter-spacing: -0.02em;
      margin-bottom: 4px;
    }

    .logo-area p {
      font-size: 13px;
      color: var(--text-dim);
      font-weight: 400;
    }

    /* ── Card ── */
    .card {
      background: var(--hdr-color);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 28px;
      box-shadow:
          0 1px 0 rgba(255,255,255,0.05) inset,
          0 20px 60px rgba(0,0,0,0.4),
          0 4px 16px rgba(0,0,0,0.25);
    }

    /* ── Field ── */
    .field {
      margin-bottom: 16px;
    }

    .field label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      color: var(--text-muted);
      letter-spacing: 0.03em;
      margin-bottom: 7px;
    }

    input[type="text"],
    input[type="password"] {
      width: 100%;
      padding: 10px 13px;
      background: var(--ctr-color);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text-primary);
      font-family: 'Outfit', sans-serif;
      font-size: 14px;
      font-weight: 400;
      outline: none;
      transition: border-color 0.18s var(--ease), box-shadow 0.18s var(--ease);
    }
    input[type="text"]::placeholder,
    input[type="password"]::placeholder {
      color: var(--text-dim);
    }
    input[type="text"]:hover,
    input[type="password"]:hover {
      border-color: var(--border-hover);
    }
    input[type="text"]:focus,
    input[type="password"]:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }

    /* ── Inline tips ── */
    .tip {
      font-size: 12px;
      margin-top: -10px;
      margin-bottom: 14px;
      padding: 8px 11px;
      border-radius: var(--radius-sm);
      border: 1px solid transparent;
      display: none;
      line-height: 1.5;
    }
    .tip.visible { display: block; }

    .tip.error {
      color: var(--danger);
      background: var(--danger-bg);
      border-color: rgba(224,112,112,0.2);
    }
    .tip.success {
      color: var(--success);
      background: var(--success-bg);
      border-color: rgba(107,201,122,0.2);
    }
    .tip a {
      color: inherit;
      text-decoration: underline;
      text-underline-offset: 2px;
    }

    /* ── Button ── */
    .btn {
      width: 100%;
      padding: 11px;
      background: var(--accent);
      border: none;
      border-radius: var(--radius-sm);
      color: #fff;
      font-family: 'Outfit', sans-serif;
      font-size: 14px;
      font-weight: 500;
      letter-spacing: 0.01em;
      cursor: pointer;
      margin-top: 4px;
      transition: background 0.18s var(--ease), box-shadow 0.18s var(--ease), transform 0.1s;
      box-shadow: 0 2px 12px rgba(91,140,247,0.28), 0 1px 0 rgba(255,255,255,0.1) inset;
      position: relative;
      overflow: hidden;
    }
    .btn::after {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(255,255,255,0);
      transition: background 0.15s;
    }
    .btn:hover {
      background: #6f9cf9;
      box-shadow: 0 4px 18px rgba(91,140,247,0.38);
    }
    .btn:hover::after { background: rgba(255,255,255,0.05); }
    .btn:active { transform: translateY(1px); }

    /* ── Footer ── */
    .form-footer {
      margin-top: 20px;
      text-align: center;
      font-size: 12.5px;
      color: var(--text-dim);
      line-height: 1.9;
    }
    .form-footer a {
      color: var(--text-muted);
      text-decoration: none;
      transition: color 0.18s;
    }
    .form-footer a:hover { color: var(--accent); }

    /* ── Shake animation ── */
    @keyframes shake {
      0%   { transform: translateX(0); }
      25%  { transform: translateX(-5px); }
      50%  { transform: translateX(5px); }
      75%  { transform: translateX(-5px); }
      100% { transform: translateX(0); }
    }
    .shake { animation: shake 0.3s; }

    /* ── Responsive ── */
    @media (max-width: 480px) {
      body { justify-content: flex-start; padding-top: 64px; }
      .card { padding: 22px 18px; }
    }
  </style>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/static/sw_js/sw.js')
        .then(() => console.log('Service Worker Registered'))
        .catch(console.error);
    }
  </script>
  <script src="/static/custom-alert.js"></script>
  <script src="static/admin.js"></script>
</head>
<body>

  <a href="/" class="back-button" aria-label="Go back to homepage">←</a>

  <div class="page-wrapper">

    <!-- Logo area -->
    <div class="logo-area">
      <div class="logo-icon">
        <img src="/static/android-chrome-192x192.png" width="100" height="100">
      </div>
      <h1>Future Notes</h1>
      <p>Create your account</p>
    </div>

    <!-- Card -->
    <div class="card">
      <form id="signup-form" novalidate>

        <div class="field">
          <label for="username">Username</label>
          <input type="text" id="username" autocomplete="username" placeholder="Choose a username" required>
        </div>
        <div id="username-tip" class="tip"></div>

        <div class="field">
          <label for="password">Password</label>
          <input type="password" id="password" autocomplete="new-password" placeholder="••••••••" required>
        </div>
        <div id="password-tip" class="tip"></div>

        <button type="submit" class="btn">Create account</button>

      </form>
    </div>

    <div class="form-footer">
      Already have an account? <a id="login-link" href="/login_page">Sign in</a>
    </div>

  </div>

  <script>
document.addEventListener("DOMContentLoaded", () => {

  // Patch fetch once
  if (!window.__fetchPatched) {
    const _f = window.fetch;
    window.fetch = (url, opts = {}) => {
      opts.credentials = 'include';
      return _f(url, opts);
    };
    window.__fetchPatched = true;
  }

  // Carry over query params to login link
  const query = window.location.search;
  if (query) {
    const link = document.getElementById("login-link");
    if (link) link.href = "/login_page" + query;
  }

  const passwordInput = document.getElementById("password");
  const passwordTip   = document.getElementById("password-tip");
  const usernameInput = document.getElementById("username");
  const usernameTip   = document.getElementById("username-tip");

  function setTip(el, msg, type) {
    el.textContent = '';
    el.innerHTML = msg;
    el.className = 'tip visible ' + (type || '');
  }

  function hideTip(el) {
    el.className = 'tip';
    el.textContent = '';
  }

  function hasSequentialPattern(str) {
    if (str.length < 4) return false;
    str = str.toLowerCase();

    for (let i = 0; i <= str.length - 4; i++) {

      let asc = 1;
      let desc = 1;

      for (let j = i; j < str.length - 1; j++) {
        if (str.charCodeAt(j) + 1 === str.charCodeAt(j + 1)) {
          asc++;
          if (asc >= 4) return true;
        } else break;
      }

      for (let j = i; j < str.length - 1; j++) {
        if (str.charCodeAt(j) - 1 === str.charCodeAt(j + 1)) {
          desc++;
          if (desc >= 4) return true;
        } else break;
      }
    }

    return false;
  }

  function hasExcessiveRepetition(str) {
    return /(.)\1{4,}/.test(str);
  }

  function debounce(fn, delay) {
    let timer = null;

    return function (...args) {
      clearTimeout(timer);
      timer = setTimeout(() => fn.apply(this, args), delay);
    };
  }

  async function checkUsername() {

    const username = usernameInput.value.trim();

    if (username === "") {
      hideTip(usernameTip);
      return false;
    }

    if (username.length > 80) {
      setTip(usernameTip, "✖ Username cannot be longer than 80 characters", "error shake");
      setTimeout(() => usernameTip.classList.remove("shake"), 500);
      return false;
    }

    if (/_/.test(username)) {
      setTip(usernameTip, "✖ Underscores are not allowed in the username", "error shake");
      setTimeout(() => usernameTip.classList.remove("shake"), 500);
      return false;
    }

    if (username.length < 3) {
      setTip(usernameTip, "✖ Username must be at least 3 characters long", "error shake");
      setTimeout(() => usernameTip.classList.remove("shake"), 500);
      return false;
    }

    if (!/[A-Za-z]/.test(username)) {
      setTip(usernameTip, "✖ Username must contain at least one letter", "error shake");
      setTimeout(() => usernameTip.classList.remove("shake"), 500);
      return false;
    }

    try {

      const res  = await fetch(`/username-check/${encodeURIComponent(username)}`);
      const data = await res.json();

      if (data.exists) {

        setTip(usernameTip, "✖ Username is already taken", "error shake");
        setTimeout(() => usernameTip.classList.remove("shake"), 500);
        return false;

      } else if (data.protected) {

        if (data.reason === "Profanity") {
          setTip(usernameTip, "✖ Username contains inappropriate language", "error shake");
        } else {
          setTip(usernameTip, "✖ Username is not allowed or too similar to a protected name. <a href='/why-protected-usernames'>Learn more</a>", "error shake");
        }

        setTimeout(() => usernameTip.classList.remove("shake"), 500);
        return false;
      }

    } catch {

      setTip(usernameTip, "✖ Error checking username", "error shake");
      setTimeout(() => usernameTip.classList.remove("shake"), 500);
      return false;

    }

    setTip(usernameTip, "✔ Username is valid", "success");
    return true;
  }

  const debouncedCheckUsername = debounce(checkUsername, 400);

  function checkPassword() {

    const password = passwordInput.value;

    if (password === "") {
      hideTip(passwordTip);
      return false;
    }

    if (password.length < 8) {
      setTip(passwordTip, "✖ At least 8 characters", "error");
      return false;
    }

    if (!/[A-Z]/.test(password)) {
      setTip(passwordTip, "✖ At least one uppercase letter", "error");
      return false;
    }

    if (!/[a-z]/.test(password)) {
      setTip(passwordTip, "✖ At least one lowercase letter", "error");
      return false;
    }

    if (!/\d/.test(password)) {
      setTip(passwordTip, "✖ At least one digit", "error");
      return false;
    }

    if (!/[!@#$%^&*]/.test(password)) {
      setTip(passwordTip, "✖ At least one special character (!@#$%^&*)", "error");
      return false;
    }

    if (hasSequentialPattern(password)) {
      setTip(passwordTip, "✖ No sequential patterns allowed (e.g., 1234 or abcd)", "error");
      return false;
    }

    if (hasExcessiveRepetition(password)) {
      setTip(passwordTip, "✖ No more than 4 identical consecutive characters allowed", "error");
      return false;
    }

    setTip(passwordTip, "✔ Password is strong enough", "success");
    return true;
  }

  let passwordRequirementsEnabled = false;

  fetch("/password-eisen")
    .then(r => r.json())
    .then(data => {

      passwordRequirementsEnabled = data.enabled;

      if (passwordRequirementsEnabled) {

        passwordInput.addEventListener("input", checkPassword);
        usernameInput.addEventListener("input", debouncedCheckUsername);

      }

    })
    .catch(() => {
      passwordRequirementsEnabled = true;
    });

  document.getElementById("signup-form").addEventListener("submit", async e => {

    e.preventDefault();

    const uname = usernameInput.value.trim();
    const pwd   = passwordInput.value;

    if (passwordRequirementsEnabled) {

      const passOk = checkPassword();
      const userOk = await checkUsername();

      if (!passOk || !userOk) {

        passwordTip.classList.remove("shake");
        void passwordTip.offsetWidth;
        passwordTip.classList.add("shake");

        return;
      }
    }

    try {

      const res = await fetch("/signup", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ username: uname, password: pwd })
      });

      const data = await res.json();

      if (res.ok) {

        if (data.redirect) {
          window.location.href = data.redirect;
        } else {
          sessionStorage.setItem("current_user_id", data.user_id);
          window.location.href = "/index";
        }

      } else {

        alert(data.error || "Signup failed");

      }

    } catch (error) {

      console.error("Signup error:", error);
      alert("An error occurred during signup");

    }

  });

});
</script>

</body>
</html>
